<!-- 
  📄 ARQUIVO: index.html
  🧠 PROPÓSITO: Tela de boas-vindas do Totem.
  
  Esta é a "porta de entrada" da loja. O único objetivo dela é coletar o CPF 
  do cliente e mandar para o app.js verificar se ele já existe no banco.
  
  💡 DICA DE MELHORIA FUTURA: Colocar uma validação de máscara "ao vivo" mais bonita, 
  que pinte a borda de vermelho se o CPF estiver faltando números, antes mesmo 
  de clicar no botão de continuar.
-->
<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Totem Paraferro - Autoatendimento</title>
  
  <!-- IMPORTAÇÕES (Dependências Externas) -->
  <!-- O Tailwind é nosso "CSS mágico", o Lucide dá os ícones e o Supabase conecta ao banco -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <!-- SUPABASE CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>

<!-- O 'overflow-hidden' e 'select-none' previnem a tela de rolar e o usuário selecionar textos, simulando um Totem real (Kiosk Mode) -->
<body class="text-blue-900 h-screen overflow-hidden select-none bg-slate-50">
  <div class="flex h-full w-full bg-slate-50 overflow-hidden">
    <div class="flex-1 relative bg-slate-50 overflow-y-auto" id="main-content">
      <section id="screen-cpf" class="h-full flex flex-col items-center justify-center p-6 fade-in">
        <div class="w-full bg-white px-8 py-10 rounded-3xl shadow-xl border border-slate-200 text-center">
          <div class="flex justify-center mb-4 bg-whithe/10 rounded-xl p-4">
            <img src="https://i.postimg.cc/RCfJNQY9/logoparaferro.png" alt="Logo da Empresa" />
          </div>

          <h2 class="text-5xl font-extrabold mb-2 text-blue-900 w-full whitespace-nowrap text-center tracking-tighter">
            Autoatendimento Paraferro
          </h2>
          <p class="text-4x1 font-bold mb-6 text-blue-900 whitespace-nowrap">
            Sua compra rápida - Sem Filas - Retira imediata!
          </p>

          <!-- ========================================== -->
          <!-- BLOCO: ENTRADA DE DADOS DO USUÁRIO         -->
          <!-- ========================================== -->
          <div class="text-left">
            <label class="block text-xs font-bold text-blue-900 uppercase mb-2 ml-1">Número do CPF</label>
            
            <!-- ⚡ EVENTO IMPORTANTE: oninput -->
            <!-- A cada letra ou número digitado, chamamos o 'mascaraCPF()' lá no app.js -->
            <!-- Isso que faz os pontos . e o traço - aparecerem na hora! -->
            <input type="tel" id="input-cpf-check" placeholder="000.000.000-00" maxlength="14"
              class="w-full text-center text-3xl font-bold tracking-tighter border-2 border-slate-300 bg-slate-50 text-blue-900 rounded-2xl p-5 focus:outline-none focus:border-blue-900 transition-all mb-6 placeholder-slate-400 shadow-inner"
              oninput="mascaraCPF(this)" />
          </div>

          <!-- ========================================== -->
          <!-- BLOCO: AÇÃO DO USUÁRIO                     -->
          <!-- ========================================== -->
          <!-- ⚡ EVENTO IMPORTANTE: onclick -->
          <!-- Quando o botão é clicado, inicia o processo de verificação no banco de dados -->
          <button onclick="verificarCPF()"
            class="w-full bg-blue-900 text-white text-xl font-black py-5 rounded-2xl hover:bg-blue-800 shadow-lg shadow-blue-900/20 transition-all active:scale-95">
            CONTINUAR
          </button>
        </div>
      </section>
    </div>
  </div>
  
  <!-- ⚙️ SCRIPTS DA APLICAÇÃO -->
  <!-- A ordem importa: primeiro o banco (supabase-config), depois a inteligência (app.js) -->
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Inicializa todos os ícones <i data-lucide="..."> da tela na hora que carrega.
    lucide.createIcons();
  </script>
</body>

</html>
