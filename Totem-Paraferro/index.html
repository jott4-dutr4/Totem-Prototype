<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Totem Paraferro - Autoatendimento</title>

  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <!-- SUPABASE CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/output.css" />
</head>

<body class="
    text-blue-900
    h-screen
    overflow-hidden
    select-none
    bg-slate-50
  ">
  <div class="
    flex
    h-full
    w-full
    bg-slate-50
    overflow-hidden
  ">
    <div class="
    flex-1
    relative
    bg-slate-50
    overflow-y-auto
  " id="main-content">
      <section id="screen-cpf" class="
    h-full
    flex
    flex-col
    items-center
    justify-center
    p-6
    fade-in
  ">
        <div class="card-padrao">
          <div class="
    flex
    justify-center
    mb-4
    bg-whithe/10
    rounded-xl
    p-4
  ">
            <img src="https://i.postimg.cc/RCfJNQY9/logoparaferro.png" alt="Logo da Empresa" />
          </div>

          <h2 class="
    text-5xl
    font-extrabold
    mb-2
    text-blue-900
    w-full
    whitespace-nowrap
    text-center
    tracking-tighter
  ">
            Autoatendimento Paraferro
          </h2>
          <p class="
    text-4x1
    font-bold
    mb-6
    text-blue-900
    whitespace-nowrap
  ">
            Sua compra rápida - Sem Filas - Retira imediata!
          </p>

          <div class="text-left">
            <label class="
    block
    text-xs
    font-bold
    text-blue-900
    uppercase
    mb-2
    ml-1
  ">Número do CPF</label>
            <input type="tel" id="input-cpf-check" placeholder="000.000.000-00" maxlength="14" class="
    input-padrao
    mb-6
  " oninput="mascaraCPF(this)" />
          </div>

          <button onclick="verificarCPF()" class="
    btn-primary
    hover:bg-blue-800
    active:scale-95
    w-full
    text-xl
  ">
            CONTINUAR
          </button>
        </div>
      </section>
    </div>
  </div>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>

</html>
