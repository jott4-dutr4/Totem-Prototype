<!-- 
  📄 ARQUIVO: index.html
  🧠 PROPÓSITO: Tela Home (Boas-vindas) do Totem.
  
  Esta é a "porta de entrada" do totem. Exibe a marca, uma mensagem de
  boas-vindas e aguarda qualquer toque para iniciar o atendimento.
  Ao tocar, vai direto para o catálogo de produtos — sem pedir CPF aqui.
-->
<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Totem Paraferro - Autoatendimento</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/output.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      cursor: pointer;
    }

    /* ── Tela home ocupa 100% e é clicável ── */
    .home-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100%;
      background: linear-gradient(160deg, #e8f0fe 0%, #f8fafc 50%, #dbeafe 100%);
      position: relative;
      overflow: hidden;
    }

    /* ── Círculos decorativos de fundo ── */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.15;
      animation: floatCircle 6s ease-in-out infinite;
    }

    .bg-circle-1 {
      width: 500px;
      height: 500px;
      background: #1e3a8a;
      top: -150px;
      right: -150px;
      animation-delay: 0s;
    }

    .bg-circle-2 {
      width: 300px;
      height: 300px;
      background: #2563eb;
      bottom: -80px;
      left: -80px;
      animation-delay: 2s;
    }

    .bg-circle-3 {
      width: 200px;
      height: 200px;
      background: #1e3a8a;
      bottom: 100px;
      right: 50px;
      animation-delay: 4s;
    }

    @keyframes floatCircle {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-20px);
      }
    }

    /* ── Conteúdo central ── */
    .home-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      position: relative;
      z-index: 10;
      animation: fadeInUp 0.8s ease both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Logo ── */
    .home-logo {
      width: 460px;
      max-width: 80vw;
      filter: drop-shadow(0 8px 24px rgba(30, 58, 138, 0.15));
      animation: fadeInUp 0.8s ease 0.1s both;
    }

    /* ── Textos ── */
    .home-welcome {
      font-size: clamp(64px, 8vw, 82px);
      font-weight: 900;
      color: #1e3a8a;
      letter-spacing: -1.5px;
      text-align: center;
      animation: fadeInUp 0.8s ease 0.2s both;
    }

    .home-subtitle {
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 500;
      color: #475569;
      text-align: center;
      animation: fadeInUp 0.8s ease 0.3s both;
    }

    /* ── Badge "Toque para começar" ── */
    .home-cta {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1e3a8a;
      color: white;
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 800;
      padding: 18px 40px;
      border-radius: 100px;
      box-shadow: 0 8px 30px rgba(30, 58, 138, 0.35);
      animation: fadeInUp 0.8s ease 0.4s both, pulse 2.5s ease-in-out 1s infinite;
      letter-spacing: -0.3px;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 8px 30px rgba(30, 58, 138, 0.35);
        transform: scale(1);
      }

      50% {
        box-shadow: 0 12px 40px rgba(30, 58, 138, 0.5);
        transform: scale(1.02);
      }
    }

    /* ── Ícone pulsante no CTA ── */
    .cta-icon {
      color: #60a5fa;
      animation: clickPulse 1.5s ease-in-out infinite;
    }

    @keyframes clickPulse {

      0%,
      100% {
        transform: scale(1) translateY(0);
      }

      50% {
        transform: scale(0.9) translateY(3px);
      }
    }

    /* ── Tracinhos do clique piscando ── */
    .click-rays {
      animation: rayFlash 1.5s ease-in-out infinite;
      transform-origin: 8px 4px;
    }

    @keyframes rayFlash {

      0%,
      35%,
      70%,
      100% {
        opacity: 0;
        transform: scale(0.6);
      }

      45%,
      55% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body onclick="iniciarAtendimento()">

  <div class="home-screen">
    <!-- Círculos decorativos de fundo -->
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>

    <!-- Conteúdo principal -->
    <div class="home-content">
      <img src="https://i.postimg.cc/RCfJNQY9/logoparaferro.png" alt="Logo Paraferro" class="home-logo" />

      <h1 class="home-welcome">Autoatendimento<br>Para Sua Obra!</h1>

      <p class="home-subtitle">Sua compra rápida, sem filas!<br>Sua obra começa aqui.</p>

      <!-- Botão/badge de chamada para ação -->
      <div class="home-cta">
        <svg class="cta-icon" width="32" height="32" viewBox="-4 -4 36 36" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- Tracinhos do clique (Rays) -->
          <g class="click-rays">
            <path d="M8 -2v4M1 5h4M2 0l3 3M14 0l-3 3M2 10l3-3" />
          </g>

          <!-- Mão inclinada -->
          <g transform="rotate(-25 10 10) translate(2, 2)">
            <path d="M8 12V5a2 2 0 0 1 4 0v6" />
            <path d="M12 11V9a2 2 0 0 1 4 0v3" />
            <path d="M16 12v-1a2 2 0 0 1 4 0v3" />
            <path d="M20 13v-1a2 2 0 0 1 4 0v5a7 7 0 0 1-7 7H9.5a7 7 0 0 1-6-3.5L1.5 16a2 2 0 0 1 3.5-2l3 3.5" />
          </g>
        </svg>
        Toque na tela para começar
      </div>

      <script>
        /**
         * iniciarAtendimento()
         * Chamada ao tocar/clicar em qualquer lugar da tela.
         * Limpa qualquer sessão anterior e vai direto para o catálogo.
         */
        function iniciarAtendimento() {
          // Limpa sessão anterior (garante carrinho zerado para nova venda)
          sessionStorage.clear();
          window.location.href = 'produtos.html';
        }
      </script>
</body>

</html>
