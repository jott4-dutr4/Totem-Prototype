<!-- 
  📄 ARQUIVO: resumo.html
  🧠 PROPÓSITO: Tela de revisão do carrinho.
  
  Aqui o cliente confere tudo o que pegou, pode alterar as quantidades 
  ou até remover itens antes de ir para o pagamento. 
-->
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Totem Paraferro - Autoatendimento (Resumo)</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <!-- SUPABASE CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/output.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="
    text-blue-900
    h-screen
    overflow-hidden
    select-none
    bg-slate-50
  ">
    <div class="
    flex
    h-full
    w-full
    bg-slate-50
    overflow-hidden
  ">
      <div class="
    flex-1
    relative
    bg-slate-50
    overflow-y-auto
  " id="main-content">
        <section id="screen-resumo" class="
    h-full
    flex
    flex-col
    fade-in
    bg-slate-50
    w-full
    max-w-5xl
    mx-auto
  ">
          <div class="p-4 md:p-6 bg-white border-b border-slate-200 flex justify-between items-center gap-4 sticky top-0 z-30 shadow-sm min-h-[80px] md:min-h-[100px]">
            <div class="z-10 shrink-0">
              <h2 class="text-lg sm:text-xl md:text-2xl font-black text-blue-900 leading-tight">Resumo do Pedido</h2>
              <p class="text-[9px] sm:text-[10px] md:text-xs text-slate-500 uppercase font-bold tracking-widest mt-0.5">Revise seus itens</p>
            </div>

            <img
              src="https://i.postimg.cc/RCfJNQY9/logoparaferro.png"
              alt="Logo Paraferro"
              class="w-24 sm:w-32 md:w-44 max-h-12 md:max-h-16 object-contain"
            />
          </div>

          <div class="
    flex-1
    overflow-y-auto
    p-6
    space-y-4
  " id="lista-resumo-completo">
            <!-- Itens serão renderizados aqui -->
          </div>

          <div class="bg-white border-t border-slate-200 p-6 md:p-8 sticky bottom-0 z-30 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] flex flex-col md:flex-row md:justify-between md:items-center gap-6">
            <div class="flex justify-between items-center text-blue-900 md:block">
              <span class="text-lg font-bold md:block">Total do Pedido</span>
              <span class="text-3xl font-black md:block mt-1">R$ <span id="total-resumo-tela">0.00</span></span>
            </div>

            <div class="flex flex-row gap-4 w-full md:w-auto">
              <button onclick="window.location.href='produtos.html'" class="flex-1 md:flex-none bg-white text-blue-900 border-2 border-blue-900 font-black py-4 px-4 sm:px-8 rounded-2xl shadow-sm hover:bg-slate-50 active:scale-95 transition-all text-xs sm:text-sm uppercase text-center flex items-center justify-center">
                Continuar Comprando
              </button>

              <button onclick="irParaIdentificacao()" class="flex-1 md:flex-none bg-green-600 text-white font-black py-4 px-4 sm:px-12 rounded-2xl shadow-lg hover:bg-green-700 active:scale-95 transition-all text-xs sm:text-base uppercase text-center flex items-center justify-center">
                Gerar Pedido
              </button>
            </div>
          </div>
        </section>
      </div>
    </div>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script>
      lucide.createIcons();
      window.onload = function() {
          carregarSessao();           // Carrega carrinho e estado da sessão
          carregarCarrinhoDaSessao(); // Restaura o carrinho
          renderizarResumoCompleto(); // Desenha a lista de itens
          iniciarTimerInatividade();  // Timer de inatividade (30s)
      };
    </script>
  </body>
</html>
