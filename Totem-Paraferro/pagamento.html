<!-- 
  📄 ARQUIVO: pagamento.html
  🧠 PROPÓSITO: Tela de checkout (Finalizar a Compra).
  
  Aqui o cliente vê o resumão na lateral e escolhe como vai pagar. 
  Esta tela tem o botão mais importante do sistema: "CONCLUIR COMPRA", 
  que joga de fato tudo para o banco de dados e gera a venda.
-->
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Totem Paraferro - Autoatendimento (Pagamento)</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <!-- SUPABASE CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/output.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="
    text-blue-900
    h-screen
    overflow-hidden
    select-none
    bg-slate-50
  ">
    <div class="
    flex
    h-full
    w-full
    bg-slate-50
    overflow-hidden
  ">
      <div class="
    flex-1
    relative
    bg-slate-50
    overflow-y-auto
  " id="main-content">
        <section id="screen-pagamento" class="
    h-full
    flex
    flex-col
    fade-in
    bg-slate-50
    w-full
    max-w-6xl
    mx-auto
  ">
          <div class="
    flex-1
    overflow-y-auto
    p-6
    md:p-12
  ">
            <div class="
    max-w-6xl
    mx-auto
    grid
    grid-cols-1
    lg:grid-cols-2
    gap-10
  ">
              <div class="space-y-6">
                <div>
                  <h2 id="header-pagamento" class="
    text-3xl
    font-black
    text-blue-900
    mb-2
  ">
                    Escolha como pagar
                  </h2>
                  <p class="
    text-slate-500
    text-sm
    font-medium
    mb-6
  ">
                    Selecione uma forma de pagamento para o valor total de
                    <span id="pag-texto-total" class="
    font-bold
    text-blue-900
  ">R$ 0,00</span>.
                  </p>
                </div>

                <div class="space-y-4">
                  <!-- ⚡ EVENTO IMPORTANTE: Cada botão chama selecionarPagamento passando um texto para o app.js guardar no estado (memória). -->
                  <button
                    onclick="selecionarPagamento('PIX')"
                    id="btn-pag-pix"
                    class="
    btn-pagamento
    w-full
    bg-white
    border-2
    border-slate-300
    p-5
    rounded-2xl
    flex
    items-center
    justify-between
    hover:border-blue-900
    transition-all
    text-left
    group
    shadow-sm
    active:scale-95
  "
                  >
                    <div class="
    flex
    items-center
    gap-4
  ">
                      <div class="
    bg-[#E2F9F8]
    w-12
    h-12
    rounded-full
    group-hover:scale-110
    transition-transform
    flex
    items-center
    justify-center
  ">
                        <i class="
    fa-brands
    fa-pix
    text-[24px]
    text-[#32BCAD]
  "></i>
                      </div>
                      <div>
                        <p class="
    font-bold
    text-blue-900
    text-lg
    leading-tight
  ">Pix</p>
                        <p class="
    text-[11px]
    text-blue-700
    font-bold
    mt-1
    bg-blue-100
    inline-block
    px-2
    py-0.5
    rounded
    uppercase
    tracking-wider
  ">
                          Aprovação imediata
                        </p>
                      </div>
                    </div>
                    <i data-lucide="chevron-right" class="
    text-slate-400
    group-hover:text-blue-900
  "></i>
                  </button>

                  <button
                    onclick="selecionarPagamento('Cartão de Crédito')"
                    id="btn-pag-credito"
                    class="
    btn-pagamento
    w-full
    bg-white
    border-2
    border-slate-300
    p-5
    rounded-2xl
    flex
    items-center
    justify-between
    hover:border-blue-900
    transition-all
    text-left
    group
    shadow-sm
  "
                  >
                    <div class="
    flex
    items-center
    gap-4
  ">
                      <div class="
    text-blue-600
    bg-blue-50
    p-3
    rounded-full
    group-hover:scale-110
    transition-transform
  ">
                        <i data-lucide="credit-card" class="
    w-6
    h-6
  "></i>
                      </div>
                      <div>
                        <p class="
    font-bold
    text-blue-900
    text-lg
    leading-tight
  ">
                          Cartão de Crédito
                        </p>
                        <p class="
    text-xs
    text-slate-500
    font-medium
    mt-1
  ">
                          Pague aproximando ou inserindo
                        </p>
                      </div>
                    </div>
                    <i data-lucide="chevron-right" class="
    text-slate-400
    group-hover:text-blue-900
  "></i>
                  </button>

                  <button
                    onclick="selecionarPagamento('Cartão de Débito')"
                    id="btn-pag-debito"
                    class="
    btn-pagamento
    w-full
    bg-white
    border-2
    border-slate-300
    p-5
    rounded-2xl
    flex
    items-center
    justify-between
    hover:border-blue-900
    transition-all
    text-left
    group
    shadow-sm
  "
                  >
                    <div class="
    flex
    items-center
    gap-4
  ">
                      <div class="
    relative
    text-blue-600
    bg-blue-50
    p-3
    rounded-full
    group-hover:scale-110
    transition-transform
  ">
                        <i data-lucide="credit-card" class="
    w-6
    h-6
  "></i>
                        <span class="
    absolute
    inset-0
    flex
    items-center
    justify-center
    text-[6px]
    font-extrabold
    text-green-600
    mt-1
  ">$</span>
                      </div>
                      <div>
                        <p class="
    font-bold
    text-blue-900
    text-lg
    leading-tight
  ">
                          Cartão de Débito
                        </p>
                        <p class="
    text-xs
    text-slate-500
    font-medium
    mt-1
  ">
                          Débito direto na conta
                        </p>
                      </div>
                    </div>
                    <i data-lucide="chevron-right" class="
    text-slate-400
    group-hover:text-blue-900
  "></i>
                  </button>
                </div>
              </div>

              <!-- ========================================== -->
              <!-- COLUNA DIREITA: RESUMO DO PEDIDO           -->
              <!-- ========================================== -->
              <div class="lg:pl-10">
                <div class="
    bg-white
    p-6
    rounded-3xl
    border
    border-slate-200
    shadow-xl
    h-full
    flex
    flex-col
  ">
                  <h3 class="
    text-xl
    font-black
    mb-6
    text-blue-900
    border-b
    border-slate-100
    pb-4
  ">
                    Resumo do pedido
                  </h3>

                  <div id="resumo-itens" class="
    space-y-4
    mb-6
    flex-1
    overflow-y-auto
    pr-2
    custom-scrollbar
  "></div>

                  <div class="
    border-t
    border-slate-100
    pt-6
    space-y-3
  ">
                    <div class="
    flex
    justify-between
    text-slate-600
    text-sm
    font-bold
  ">
                      <span>Total em produtos</span>
                      <span id="resumo-subtotal" class="text-blue-900">R$ 0.00</span>
                    </div>
                    <div class="
    flex
    justify-between
    text-slate-600
    text-sm
    font-bold
  ">
                      <span>Entrega / Retirada</span>
                      <span class="text-green-600">Grátis</span>
                    </div>
                    <div class="
    flex
    justify-between
    items-center
    text-blue-900
    text-3xl
    font-black
    mt-4
    pt-4
    border-t
    border-slate-200
  ">
                      <span>Total</span>
                      <span id="resumo-total-final">R$ 0.00</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="
    bg-white
    border-t
    border-slate-200
    p-6
    flex
    gap-4
    z-30
    shrink-0
    shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]
  ">
            <button
              onclick="window.location.href='resumo.html'"
              class="
    btn-secondary
    hover:bg-slate-200
  "
            >
              VOLTAR
            </button>
            
            <!-- ⚡ BOTÃO DE AÇÃO PRINCIPAL -->
            <!-- Começa desabilitado (disabled). Só liga quando o usuário clica em alguma forma de pagamento -->
            <!-- Ao clicar, chama finalizarVenda() no app.js, onde a mágica do banco de dados acontece. -->
            <button
              onclick="finalizarVenda()"
              id="btn-finalizar-venda-novo"
              class="
    btn-primary
    hover:bg-blue-800
    disabled:bg-slate-200
    disabled:text-slate-400
    disabled:shadow-none
    flex-[2]
  "
              disabled
            >
              <span id="btn-finalizar-texto">CONCLUIR COMPRA</span>
            </button>
          </div>
        </section>
      </div>
    </div>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script>
      lucide.createIcons();
      window.onload = function() {
          carregarSessao();          // Carrega carrinho e estado da sessão
          carregarCarrinhoDaSessao(); // Restaura o carrinho
          atualizarResumoPedidoUI(); // Pinta os valores de Total e a lista de itens
          iniciarTimerInatividade(); // Timer de inatividade (30s)
      };
    </script>
  </body>
</html>
