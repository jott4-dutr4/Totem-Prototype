<!-- 
  📄 ARQUIVO: produtos.html
  🧠 PROPÓSITO: Tela principal da loja (Catálogo).
  
  Aqui o cliente vê quem ele é, busca produtos, adiciona no carrinho 
  e vê o valor total subindo. Esta tela é fortemente dependente 
  do Javascript (app.js) para desenhar as "caixinhas" dos produtos.
-->
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Totem Paraferro - Autoatendimento (Produtos)</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <!-- SUPABASE CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/output.css" />
  </head>
  <body class="
    text-blue-900
    h-screen
    overflow-hidden
    select-none
    bg-slate-50
  ">
    <div class="
    flex
    h-full
    w-full
    bg-slate-50
    overflow-hidden
  ">
      <div class="
    flex-1
    relative
    bg-slate-50
    overflow-y-auto
  " id="main-content">
        <section id="screen-produtos" class="
    h-full
    flex
    flex-col
    fade-in
    bg-slate-50
  ">
          <div class="
    p-4
    md:p-6
    bg-white
    border-b
    border-slate-200
    flex
    justify-between
    items-center
    sticky
    top-0
    z-30
    shadow-sm
  ">
            <div class="
    flex
    items-center
    gap-3
  ">
              <div class="
    w-10
    h-10
    md:w-12
    h-12
    bg-blue-100
    rounded-full
    flex
    items-center
    justify-center
    text-blue-900
    shrink-0
  ">
                <i data-lucide="user"></i>
              </div>
              <div>
                <h2 class="
    text-lg
    md:text-xl
    font-bold
    text-blue-900
    leading-tight
  " id="display-cliente-nome">
                  ...
                </h2>
                <button onclick="reiniciarTotem()" class="
    text-[10px]
    md:text-xs
    text-red-500
    uppercase
    font-bold
    tracking-widest
    hover:underline
    mt-1
  ">
                  Sair / Nova Venda
                </button>
              </div>
            </div>

            <img
              src="https://i.postimg.cc/RCfJNQY9/logoparaferro.png"
              alt="Logo Paraferro"
              class="
    w-32
    md:w-44
    absolute
    top-1/2
    left-1/2
    -translate-y-1/2
    -translate-x-1/2
    z-50
  "
            />

            <div class="
    flex
    items-center
    gap-3
    md:gap-4
    justify-end
  ">
              <button
                onclick="irParaPagamento()"
                class="
    relative
    p-3
    md:p-4
    bg-blue-900
    text-white
    rounded-full
    shadow-lg
    hover:bg-blue-800
    active:scale-95
    transition-all
    z-50
  "
                id="btn-carrinho-topo"
              >
                <i data-lucide="shopping-cart" class="
    w-5
    h-5
    md:w-7
    md:h-7
  "></i>
                <span
                  id="cart-badge"
                  class="
    absolute
    -top-1
    -right-1
    bg-red-600
    text-white
    text-[10px]
    font-bold
    min-w-[20px]
    h-5
    md:min-w-[24px]
    md:h-6
    flex
    items-center
    justify-center
    rounded-full
    border-2
    border-white
    hidden
  "
                >0</span>
              </button>
            </div>
          </div>

          <div class="
    flex-1
    flex
    flex-col
    overflow-hidden
    relative
  ">
            <div class="
    flex-1
    flex
    flex-col
    p-4
    md:p-6
    overflow-y-auto
    bg-slate-50
  ">
              <div class="
    relative
    mb-6
    group
  ">
                <i data-lucide="search" class="
    absolute
    left-5
    top-1/2
    -translate-y-1/2
    text-slate-400
    group-focus-within:text-blue-900
    transition-colors
  "></i>
                <input
                  id="search-catalogo"
                  type="text"
                  placeholder="O que você está procurando hoje?"
                  class="
    w-full
    pl-14
    pr-6
    py-4
    border-2
    border-slate-300
    bg-white
    text-blue-900
    shadow-sm
    rounded-2xl
    text-base
    md:text-lg
    focus:border-blue-900
    outline-none
    transition-all
    placeholder-slate-400
  "
                  oninput="filtrarCatalogo(this.value)"
                />
              </div>

              <!-- Loading spinner -->
              <div id="loading-produtos" class="
    flex
    flex-col
    items-center
    justify-center
    py-20
    text-blue-900
  ">
                  <i data-lucide="loader-2" class="
    w-8
    h-8
    animate-spin
    mb-4
  "></i>
                  <p class="font-bold">Carregando catálogo...</p>
              </div>

              <div id="grid-catalogo" class="
    grid
    grid-cols-2
    gap-4
    md:gap-6
    pb-20
    hidden
  "></div>
            </div>
          </div>

          <div class="
    bg-white
    border-t-2
    border-slate-100
    px-8
    py-6
    flex
    justify-between
    items-center
    z-30
    shrink-0
    shadow-[0_-10px_30px_-10px_rgba(0,0,0,0.08)]
  ">
            <span class="
    text-2xl
    md:text-3xl
    font-black
    text-blue-900
    tracking-tight
  ">Total</span>
            <span class="
    text-2xl
    md:text-3xl
    font-black
    text-blue-900
    tracking-tight
  ">R$ <span id="cart-total-rodape">0.00</span></span>
          </div>
        </section>
      </div>
    </div>
    
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script>
      lucide.createIcons();
      
      // ==========================================
      // 🧠 INICIALIZAÇÃO DA TELA (window.onload)
      // ==========================================
      window.onload = function() {
          carregarSessao();              // 1. Carrega estado da sessão (carrinho, cliente se houver)
          carregarProdutosDoBanco();     // 2. Vai no Supabase baixar os produtos
          carregarCarrinhoDaSessao();    // 3. Restaura carrinho na tela
          iniciarTimerInatividade();     // 4. Ativa timer de inatividade (30s)
      };
    </script>
  </body>
</html>
