<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Totem Paraferro - Autoatendimento (Produtos)</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/output.css" />
  </head>

  <body style="margin:0; padding:0; height:100vh; overflow:hidden; font-family:'Inter',sans-serif; background:#f8fafc;">

    <!-- Layout raiz: Sidebar + Conteúdo -->
    <div style="display:flex; height:100vh; width:100%; overflow:hidden;">

      <!-- ============================================
           SIDEBAR ESQUERDA (Navegação + Logo + Usuário)
           ============================================ -->
      <aside class="sidebar-catalogo">

        <!-- Logo -->
        <div class="sidebar-logo">
          <img
            src="https://i.postimg.cc/RCfJNQY9/logoparaferro.png"
            alt="Logo Paraferro"
            style="width:130px; object-fit:contain;"
          />
        </div>

        <!-- Título da seção de navegação -->
        <p class="sidebar-nav-title">Categorias</p>

        <!-- Botões de categoria (gerado pelo JS) -->
        <nav class="sidebar-nav" id="nav-categorias">
          <button
            class="cat-btn ativo"
            id="cat-btn-todos"
            onclick="filtrarPorCategoria('todos')"
          >
            Todos os Materiais
          </button>
          <!-- Categorias dinâmicas são inseridas aqui pelo JS -->
        </nav>

        <!-- Rodapé: Sair -->
        <div class="sidebar-footer">
          <!-- Elemento oculto mantido para compatibilidade com o JS (verificarSessaoCliente) -->
          <span id="display-cliente-nome" style="display:none;"></span>
          <button
            onclick="reiniciarTotem()"
            style="
              display:flex; align-items:center; gap:8px;
              color:#f87171; font-weight:900; font-size:13px;
              letter-spacing:0.05em; text-transform:uppercase;
              background:none; border:none; cursor:pointer; padding:0;
            "
          >
            <i data-lucide="door-open" style="width:18px; height:18px; color:#f87171;"></i>
            Sair
          </button>
        </div>
      </aside>

      <!-- ============================================
           ÁREA CENTRAL (Busca + Produtos + Carrinho)
           ============================================ -->
      <div style="flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0;">

        <!-- Barra de Pesquisa -->
        <div style="padding:16px 16px 10px; background:#f8fafc; flex-shrink:0;">
          <div style="position:relative;">
            <i
              data-lucide="search"
              style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#94a3b8; width:18px; height:18px;"
            ></i>
            <input
              id="search-catalogo"
              type="text"
              placeholder="Pesquisar produto..."
              oninput="filtrarCatalogo(this.value)"
              style="
                width:100%; box-sizing:border-box;
                padding:13px 14px 13px 42px;
                border:2px solid #e2e8f0;
                border-radius:16px;
                font-size:14px;
                font-family:'Inter',sans-serif;
                color:#1e3a8a;
                background:#fff;
                outline:none;
                transition:border-color 0.2s;
              "
              onfocus="this.style.borderColor='#1e3a8a'"
              onblur="this.style.borderColor='#e2e8f0'"
            />
          </div>
        </div>

        <!-- Título da Categoria Ativa -->
        <div style="padding:0 16px 10px; flex-shrink:0;">
          <h2
            id="titulo-categoria"
            style="font-size:18px; font-weight:900; color:#1e3a8a; margin:0;"
          >
            Todos os Materiais
          </h2>
        </div>

        <!-- Grid de Produtos (scrollável) -->
        <div style="flex:1; overflow-y:auto; padding:0 16px 12px;">

          <!-- Sem spinner de loading: produtos aparecem direto no grid -->
          <div
            id="grid-catalogo"
            style="display:none; grid-template-columns:1fr 1fr; gap:12px;"
          ></div>

        </div>

        <!-- ============================================
             BARRA INFERIOR DO CARRINHO
             ============================================ -->
        <div class="cart-bar">
          <!-- Ícone + Total -->
          <div style="display:flex; align-items:center; gap:14px;">
            <div style="position:relative;">
              <i data-lucide="shopping-cart" style="width:28px; height:28px; color:#fff;"></i>
              <span
                id="cart-badge"
                style="
                  display:none;
                  position:absolute; top:-8px; right:-8px;
                  background:#ef4444; color:#fff;
                  font-size:10px; font-weight:900;
                  min-width:18px; height:18px;
                  border-radius:999px;
                  align-items:center; justify-content:center;
                  border:2px solid #1e3a8a;
                "
              >0</span>
            </div>
            <div>
              <p style="color:#93c5fd; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; margin:0;">Total do pedido</p>
              <p style="color:#fff; font-size:22px; font-weight:900; margin:0; line-height:1.2;">
                R$ <span id="cart-total-rodape">0.00</span>
              </p>
            </div>
          </div>

          <!-- Botão Ver Carrinho -->
          <button
            id="btn-carrinho-topo"
            onclick="irParaPagamento()"
            class="cart-bar-btn"
          >
            <i data-lucide="shopping-bag" style="width:20px; height:20px;"></i>
            VER CARRINHO
          </button>
        </div>

      </div><!-- fim área central -->
    </div><!-- fim layout raiz -->

    <!-- Keyframe para o spinner -->
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script>
      lucide.createIcons();
      window.onload = function () {
        verificarSessaoCliente();
        carregarCarrinhoDaSessao();
        carregarProdutosDoBanco();
      };
    </script>
  </body>
</html>
