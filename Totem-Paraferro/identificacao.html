<!-- 
  📄 ARQUIVO: identificacao.html
  🧠 PROPÓSITO: Tela de identificação do cliente (pós-carrinho).
  
  Aparece após o cliente clicar em "Gerar Pedido" no resumo.
  O cliente pode informar CPF para acumular pontos / emitir NFC-e,
  ou continuar como "Consumidor Final" sem se identificar.
-->
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Totem Paraferro - Identificação</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/output.css" />
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: 'Inter', sans-serif;
        background: #f8fafc;
        height: 100vh;
        overflow: hidden;
        user-select: none;
      }

      /* ── Layout principal ── */
      .identificacao-screen {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: #f8fafc;
      }

      /* ── Cabeçalho ── */
      .id-header {
        background: white;
        border-bottom: 1px solid #e2e8f0;
        padding: 20px 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        min-height: 80px;
        box-shadow: 0 1px 8px rgba(0,0,0,0.05);
      }
      .id-header img {
        width: 140px;
      }

      /* ── Área central de conteúdo ── */
      .id-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        gap: 0;
      }

      /* ── Card de identificação ── */
      .id-card {
        background: white;
        border-radius: 28px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 8px 40px rgba(0,0,0,0.07);
        padding: 48px 40px;
        width: 100%;
        max-width: 480px;
        animation: fadeInCard 0.4s ease both;
      }
      @keyframes fadeInCard {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* ── Ícone no topo do card ── */
      .id-icon {
        width: 72px; height: 72px;
        background: #dbeafe;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 24px;
      }

      .id-title {
        font-size: 26px;
        font-weight: 900;
        color: #1e3a8a;
        text-align: center;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .id-subtitle {
        font-size: 14px;
        color: #64748b;
        text-align: center;
        margin-bottom: 32px;
        font-weight: 500;
      }

      /* ── Campo de CPF ── */
      .id-label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: #1e3a8a;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }
      .id-input {
        width: 100%;
        border: 2px solid #cbd5e1;
        background: #f8fafc;
        color: #1e3a8a;
        border-radius: 14px;
        padding: 18px 20px;
        font-size: 22px;
        font-weight: 700;
        font-family: 'Inter', sans-serif;
        letter-spacing: 2px;
        text-align: center;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        margin-bottom: 8px;
      }
      .id-input:focus {
        border-color: #1e3a8a;
        box-shadow: 0 0 0 4px rgba(30,58,138,0.1);
        background: white;
      }
      .id-input::placeholder {
        color: #cbd5e1;
        font-weight: 400;
        letter-spacing: 1px;
      }

      /* ── Botão principal "Continuar" ── */
      .btn-continuar {
        width: 100%;
        background: #1e3a8a;
        color: white;
        font-size: 17px;
        font-weight: 800;
        padding: 20px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        margin-top: 20px;
        transition: background 0.2s, transform 0.1s;
        font-family: 'Inter', sans-serif;
        min-height: 60px;
      }
      .btn-continuar:hover { background: #1d4ed8; }
      .btn-continuar:active { transform: scale(0.98); }
      .btn-continuar:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }

      /* ── Divisor ── */
      .id-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0;
        color: #94a3b8;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .id-divider::before,
      .id-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #e2e8f0;
      }

      /* ── Botão secundário "Continuar sem CPF" ── */
      .btn-sem-cpf {
        width: 100%;
        background: white;
        color: #475569;
        font-size: 15px;
        font-weight: 700;
        padding: 18px;
        border-radius: 14px;
        border: 2px solid #e2e8f0;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s, transform 0.1s;
        font-family: 'Inter', sans-serif;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-sem-cpf:hover { background: #f1f5f9; border-color: #cbd5e1; }
      .btn-sem-cpf:active { transform: scale(0.98); }

      /* ── Rodapé (botões de navegação fixos) ── */
      .id-footer {
        background: white;
        border-top: 2px solid #f1f5f9;
        padding: 20px 32px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        shrink: 0;
      }

      /* ── Botão Voltar (padrão da app) ── */
      .btn-voltar {
        background: #f1f5f9;
        color: #1e3a8a;
        font-size: 15px;
        font-weight: 800;
        padding: 16px 28px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        font-family: 'Inter', sans-serif;
        min-height: 56px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-voltar:hover { background: #e2e8f0; }
      .btn-voltar:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="identificacao-screen">

      <!-- ── Cabeçalho ── -->
      <header class="id-header">
        <img src="https://i.postimg.cc/RCfJNQY9/logoparaferro.png" alt="Logo Paraferro" />
      </header>

      <!-- ── Corpo principal ── -->
      <main class="id-body">
        <div class="id-card">

          <!-- Ícone -->
          <div class="id-icon">
            <i data-lucide="user-check" style="width:32px;height:32px;color:#1e3a8a;"></i>
          </div>

          <h1 class="id-title">Já tem cadastro conosco?</h1>
          <p class="id-subtitle">
            Informe seu CPF para agilizar a emissão da NFC-e<br>e acumular benefícios.
          </p>

          <!-- Campo CPF -->
          <label class="id-label" for="input-cpf-identificacao">Número do CPF</label>
          <input
            type="tel"
            id="input-cpf-identificacao"
            class="id-input"
            placeholder="000.000.000-00"
            maxlength="14"
            oninput="mascaraCPF(this)"
            onkeydown="if(event.key==='Enter') verificarCPFIdentificacao()"
            autocomplete="off"
          />

          <!-- Botão principal -->
          <button
            id="btn-continuar-identificacao"
            class="btn-continuar"
            onclick="verificarCPFIdentificacao()"
          >
            Continuar
          </button>

          <!-- Divisor -->
          <div class="id-divider">ou</div>

          <!-- Botão sem CPF -->
          <button
            id="btn-sem-cpf"
            class="btn-sem-cpf"
            onclick="continuarSemCPF()"
          >
            <i data-lucide="arrow-right-circle" style="width:20px;height:20px;"></i>
            Continuar sem CPF
          </button>

        </div>
      </main>

      <!-- ── Rodapé com botão Voltar (sempre inferior esquerdo) ── -->
      <footer class="id-footer">
        <button class="btn-voltar" onclick="window.location.href='resumo.html'">
          <i data-lucide="arrow-left" style="width:18px;height:18px;"></i>
          Voltar
        </button>
        <span style="font-size:12px;color:#94a3b8;font-weight:600;letter-spacing:0.5px;">
          Etapa 3 de 4 · Identificação
        </span>
      </footer>

    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script>
      lucide.createIcons();
      window.onload = function() {
        carregarSessao(); // Garante que o carrinho está disponível
        iniciarTimerInatividade(); // Ativa o timer de inatividade
      };
    </script>
  </body>
</html>
